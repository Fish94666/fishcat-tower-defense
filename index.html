<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishcat Tower Defense</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hud-panel">
      <div class="hud-header">
        <p class="eyebrow">Fishcat Tower Defense</p>
        <h1>Hold the lane and stop every wave.</h1>
      </div>
      <div class="controls">
        <button id="start-btn" type="button">Start / Restart</button>
        <p>Choose a tower type, then place it on grass tiles. Path and rock tiles are blocked.</p>
      </div>
      <div class="life-panel" id="life-panel"></div>
      <div class="build-panel" id="build-panel"></div>
      <div class="economy-panel" id="economy-panel"></div>
      <div class="tower-info" id="tower-info"></div>
      <div class="message" id="message"></div>
    </section>
    <section class="game-shell">
      <div class="wave-panel" id="wave-panel"></div>
      <canvas id="game" width="768" height="576" aria-label="tower defense game canvas"></canvas>
    </section>
  </main>
  <script src="./main.js"></script>
</body>
</html>
