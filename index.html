<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魚貓塔防</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app-shell">
    <section class="hud-panel">
      <div class="hud-header">
        <p class="eyebrow">魚貓塔防</p>
        <h1>守住路線，撐過每一波進攻。</h1>
      </div>
      <div class="controls">
        <button id="start-btn" type="button">開始 / 重來</button>
        <p>先選擇塔種，再點草地格放置。道路和岩石格都不能建造。</p>
      </div>
      <div class="life-panel" id="life-panel"></div>
      <div class="build-panel" id="build-panel"></div>
      <div class="economy-panel" id="economy-panel"></div>
      <div class="tower-info" id="tower-info"></div>
      <div class="message" id="message"></div>
    </section>
    <section class="game-shell">
      <div class="wave-panel" id="wave-panel"></div>
      <canvas id="game" width="768" height="576" aria-label="塔防遊戲畫布"></canvas>
    </section>
  </main>
  <script src="./main.js"></script>
</body>
</html>
